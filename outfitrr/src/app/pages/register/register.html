<div class="page">

  <div class="card">

    <h2 style="margin-bottom:25px;text-align:center">Register</h2>

    <label>Name</label>
    <input [(ngModel)]="user.name" placeholder="Enter name">

    <label>Email</label>
    <input [(ngModel)]="user.email" placeholder="Enter email">

    <label>Password</label>
    <input [(ngModel)]="user.password" type="password" placeholder="Enter password">

    <button style="width:100%" (click)="register()">Register</button>

    <p style="margin-top:15px;text-align:center">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>

  </div>

</div>
